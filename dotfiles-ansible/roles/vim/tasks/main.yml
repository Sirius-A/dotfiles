# Install for specific OS
- import_tasks: debian.yml
  when: ansible_os_family == "Debian"
- import_tasks: arch.yml
  when: ansible_os_family == "Archlinux"

- name: Create config base dir
  file:
    path: "{{ neovim_config_dir }}"
    state: directory
    mode: 0o700
    owner: "{{ neovim_user_id }}"

- name: Install lazy.nvim plugin manager
  ansible.builtin.git:
    repo: 'https://github.com/folke/lazy.nvim.git'
    dest: "{{ neovim_user_dir }}/.local/share/nvim/lazy/lazy.nvim"
    clone: yes
    update: yes
    depth: 1
    version: stable

- name: Install plugins via lazy.nvim
  command: nvim --headless "+Lazy! sync" +qa
  ignore_errors: true

